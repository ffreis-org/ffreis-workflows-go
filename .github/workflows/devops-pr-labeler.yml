name: DevOps / PR Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      rules-json: |-
        [
          {"label":"ci","patterns":[".github/workflows/**",".github/actions/**"]},
          {"label":"go","patterns":["**/*.go","go.mod","go.sum"]},
          {"label":"examples","patterns":["examples/**"]},
          {"label":"scripts","patterns":["scripts/**","Makefile","lefthook.yml"]},
          {"label":"docs","patterns":["**/*.md"]}
        ]
