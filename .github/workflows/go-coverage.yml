name: Go Coverage (Codecov)

on:
  workflow_call:
    inputs:
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      go-version:
        description: "Go version to use"
        type: string
        default: "1.25"
      working-directory:
        description: "Directory containing the Go module"
        type: string
        default: "."
      test-tags:
        description: 'Build tags passed to go test via -tags'
        required: false
        type: string
        default: ''
      test-timeout:
        description: "Timeout passed to go test -timeout"
        type: string
        default: "120s"
      coverage-threshold:
        description: "Minimum line coverage percentage (0 = no gate)"
        type: number
        default: 0
      codecov-flags:
        description: "Codecov flags"
        type: string
        default: "unit"
      codecov-name:
        description: "Codecov report name"
        type: string
        default: "unit-coverage"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  coverage:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    name: Coverage (go test + Codecov)
    runs-on: ${{ fromJson(inputs.runner) }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Run tests with coverage
        env:
          TEST_TIMEOUT: ${{ inputs.test-timeout }}
          TEST_TAGS: ${{ inputs.test-tags }}
        run: |
          set -euo pipefail
          tag_args=()
          if [ -n "$TEST_TAGS" ]; then
            tag_args+=("-tags" "$TEST_TAGS")
          fi
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout="$TEST_TIMEOUT" \
            "${tag_args[@]+"${tag_args[@]}"}"

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Enforce coverage threshold
        if: ${{ inputs.coverage-threshold > 0 }}
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          set -euo pipefail
          PCT=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Line coverage: ${PCT}% (threshold: ${COVERAGE_THRESHOLD}%)"
          awk "BEGIN { exit (${PCT} < ${COVERAGE_THRESHOLD}) ? 1 : 0 }" || {
            echo "::error::Coverage ${PCT}% is below the required threshold of ${COVERAGE_THRESHOLD}%"
            exit 1
          }

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: coverage.out
          flags: ${{ inputs.codecov-flags }}
          name: ${{ inputs.codecov-name }}
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
