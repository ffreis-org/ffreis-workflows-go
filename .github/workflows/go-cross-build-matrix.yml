name: Go Cross Build (Matrix)

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version"
        type: string
        default: "1.25"
      working-directory:
        description: "Directory containing the Go module"
        type: string
        default: "."
      targets:
        description: "Newline-separated build targets (packages) to build"
        type: string
        default: "./..."
      goos:
        description: "Comma-separated GOOS list"
        type: string
        default: "linux,darwin,windows"
      goarch:
        description: "Comma-separated GOARCH list"
        type: string
        default: "amd64,arm64"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  matrix:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      goos: ${{ steps.set.outputs.goos }}
      goarch: ${{ steps.set.outputs.goarch }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Parse GOOS/GOARCH lists
        id: set
        env:
          GOOS_INPUT: ${{ inputs.goos }}
          GOARCH_INPUT: ${{ inputs.goarch }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          
          def parse_list(value: str, name: str) -> list[str]:
              v = (value or "").strip()
              if not v:
                  raise SystemExit(f"{name} is empty")
              if v.startswith("["):
                  try:
                      parsed = json.loads(v)
                  except json.JSONDecodeError as e:
                      raise SystemExit(f"{name} is not valid JSON: {e}") from e
                  if not isinstance(parsed, list) or not all(isinstance(x, str) and x.strip() for x in parsed):
                      raise SystemExit(f"{name} must be a JSON array of non-empty strings")
                  return [x.strip() for x in parsed]
              parts = [p.strip() for p in v.split(",")]
              parts = [p for p in parts if p]
              if not parts:
                  raise SystemExit(f"{name} has no valid entries")
              return parts
          
          goos = parse_list(os.environ.get("GOOS_INPUT", ""), "inputs.goos")
          goarch = parse_list(os.environ.get("GOARCH_INPUT", ""), "inputs.goarch")
          
          out_path = os.environ.get("GITHUB_OUTPUT")
          if not out_path:
              raise SystemExit("GITHUB_OUTPUT is not set")
          with open(out_path, "a", encoding="utf-8") as f:
              f.write(f"goos={json.dumps(goos)}\n")
              f.write(f"goarch={json.dumps(goarch)}\n")
          PY

  build:
    timeout-minutes: 30
    permissions:
      contents: read
    name: Cross build
    needs: [matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: ${{ fromJSON(needs.matrix.outputs.goos) }}
        goarch: ${{ fromJSON(needs.matrix.outputs.goarch) }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum
      - name: Cross-build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TARGETS: ${{ inputs.targets }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          while IFS= read -r t; do
            [[ -z "$t" ]] && continue
            echo "Building $t for $GOOS/$GOARCH"
            go build "$t"
          done <<< "$TARGETS"
