name: Go DeepSource Coverage

on:
  workflow_call:
    inputs:
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      go-version:
        description: "Go version"
        type: string
        default: "1.25"
      working-directory:
        description: "Directory containing the Go module"
        type: string
        default: "."
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
    secrets:
      DEEPSOURCE_DSN:
        required: true

jobs:
  deepsource:
    timeout-minutes: 30
    permissions:
      contents: read
    name: DeepSource
    runs-on: ${{ fromJson(inputs.runner) }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum
      - name: Run tests with coverage
        run: |
          set -euo pipefail
          go test ./... -coverprofile=coverage.out -covermode=atomic -count=1
      - name: Upload coverage to DeepSource
        uses: deepsourcelabs/test-coverage-action@4284bb73a04adb39faaa6bfcc2d0e3dd137ffed7
        with:
          key: go
          coverage-file: coverage.out
          dsn: ${{ secrets.DEEPSOURCE_DSN }}
