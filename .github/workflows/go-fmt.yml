name: Go Format Check

on:
  workflow_call:
    inputs:
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      go-version:
        description: 'Go version (e.g. "1.22")'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory to run gofmt in'
        required: false
        type: string
        default: '.'
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  fmt:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    permissions:
      contents: read
    name: Format (gofmt)
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum
      - name: Check formatting
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error title=Formatting required::The following files need gofmt:"
            printf "%s\n" "$unformatted"
            echo "Fix with: gofmt -w ."
            exit 1
          fi
