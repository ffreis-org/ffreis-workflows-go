name: Go Fuzz Testing

# Reusable workflow — callers invoke via:
#   uses: ./.github/workflows/go-fuzz.yml
#
# CI mode (default): runs every Fuzz* target for a short fixed time.
# This proves fuzz targets compile, seed corpus passes, and the code
# does not immediately panic — without burning 30+ minutes in CI.
#
# Extended mode: set fuzz-time to "10m" or more for a deeper weekly run.
#
# Exit behaviour:
#   - exit 0  → all fuzz targets passed their seed corpus + time limit
#   - exit 1  → a target panicked or a new crasher was found

on:
  workflow_call:
    inputs:
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing go.mod'
        required: false
        type: string
        default: '.'
      packages:
        description: 'Packages to scan for Fuzz* functions (space-separated)'
        required: false
        type: string
        default: './...'
      fuzz-time:
        description: >
          Per-target fuzz duration passed to -fuzztime.
          Use "30s" for CI and "10m"+ for extended runs.
        required: false
        type: string
        default: '30s'
      fuzz-parallelism:
        description: >
          Value passed to go test -parallel.
          Default 1 keeps CI smoke runs deterministic on shared runners.
        required: false
        type: string
        default: '1'
      fuzz-targets:
        description: >
          Regex of Fuzz* function names to run (passed to go test -list).
          Default "Fuzz" runs every target whose name starts with "Fuzz".
        required: false
        type: string
        default: 'Fuzz'
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  fuzz:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    name: Fuzz targets (${{ inputs.fuzz-time }} per target)
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      # Compile all packages (catches build errors before fuzzing)
      - name: Build packages
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          set -euo pipefail
          read -r -a packages_arr <<< "${PACKAGES:-}"
          go build "${packages_arr[@]}"

      # Run seed corpus for every Fuzz* target (always fast — no mutation)
      - name: Run seed corpus
        env:
          PACKAGES: ${{ inputs.packages }}
          FUZZ_TARGETS: ${{ inputs.fuzz-targets }}
        run: |
          set -euo pipefail
          read -r -a packages_arr <<< "${PACKAGES:-}"
          while IFS= read -r pkg; do
            [[ -n "$pkg" ]] || continue
            while IFS= read -r target; do
              [[ -n "$target" ]] || continue
              echo "→ seed corpus: $pkg/$target"
              go test -run="^${target}$" "$pkg"
            done < <(go test -list "${FUZZ_TARGETS}.*" "$pkg" 2>/dev/null | grep '^Fuzz' || true)
          done < <(go list "${packages_arr[@]}" 2>/dev/null)

      # Run active fuzzing for fuzz-time per target
      - name: Fuzz each target
        env:
          PACKAGES: ${{ inputs.packages }}
          FUZZ_TARGETS: ${{ inputs.fuzz-targets }}
          FUZZ_TIME: ${{ inputs.fuzz-time }}
          FUZZ_PARALLELISM: ${{ inputs.fuzz-parallelism }}
        run: |
          set -euo pipefail
          read -r -a packages_arr <<< "${PACKAGES:-}"
          failed=0
          while IFS= read -r pkg; do
            [[ -n "$pkg" ]] || continue
            while IFS= read -r target; do
              [[ -n "$target" ]] || continue
              echo "→ fuzzing: $pkg/$target for $FUZZ_TIME"
              go test \
                -run='^$' \
                -parallel="$FUZZ_PARALLELISM" \
                -fuzz="^${target}$" \
                -fuzztime="$FUZZ_TIME" \
                "$pkg" || failed=1
            done < <(go test -list "${FUZZ_TARGETS}.*" "$pkg" 2>/dev/null | grep '^Fuzz' || true)
          done < <(go list "${packages_arr[@]}" 2>/dev/null)
          exit "$failed"

      # Upload any crashers found during the run
      - name: Upload fuzz crashers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers
          path: |
            ${{ inputs.working-directory }}/**/testdata/fuzz/**/
          retention-days: 14
          if-no-files-found: ignore
