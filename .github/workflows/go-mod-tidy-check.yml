name: Go Mod Tidy Check

on:
  workflow_call:
    inputs:
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      go-version:
        description: "Go version to use"
        required: false
        type: string
        default: "1.25"
      working-directory:
        description: "Directory containing the Go module"
        required: false
        type: string
        default: "."
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      goprivate:
        description: >
          Comma-separated GOPRIVATE glob pattern(s) for private cross-repo Go
          dependencies (e.g. 'github.com/FelipeFuhr/*'). Empty (default) leaves
          GOPRIVATE/git auth untouched — zero-impact for existing callers.
        required: false
        type: string
        default: ""
    secrets:
      GIT_AUTH_TOKEN:
        description: "Token for private cross-repo Go module access (used with goprivate)"
        required: false

jobs:
  tidy:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    permissions:
      contents: read
    name: go mod tidy (clean)
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure private Go module access
        if: ${{ inputs.goprivate != '' }}
        env:
          GOPRIVATE_INPUT: ${{ inputs.goprivate }}
          GIT_AUTH_TOKEN: ${{ secrets.GIT_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "GOPRIVATE=${GOPRIVATE_INPUT}"
            echo "GONOSUMCHECK=1"
          } >> "$GITHUB_ENV"
          if [ -n "$GIT_AUTH_TOKEN" ]; then
            git config --global url."https://x-access-token:${GIT_AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: go mod tidy is clean
        run: |
          set -euo pipefail
          go mod tidy
          go mod verify

          files=(go.mod)
          if [ -f go.sum ]; then
            files+=(go.sum)
          fi

          git diff --exit-code -- "${files[@]}" || {
            echo "::error::go.mod/go.sum not tidy"
            exit 1
          }
