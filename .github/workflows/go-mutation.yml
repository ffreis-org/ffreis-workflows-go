name: Go Mutation Testing

# Reusable workflow — callers invoke via:
#   uses: ./.github/workflows/go-mutation.yml
#
# Intended schedule: weekly (Sunday 02:00 UTC) or workflow_dispatch.
# Do NOT run on every PR — mutation testing takes 5–30 min per repo.
#
# Exit behaviour:
#   - exit 0  → mutation score ≥ threshold   (pass)
#   - exit 1  → mutation score  < threshold  (fail CI)

on:
  workflow_call:
    inputs:
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing go.mod'
        required: false
        type: string
        default: '.'
      packages:
        description: 'Packages to mutate (space-separated), e.g. "./internal/engine/... ./internal/rule/..."'
        required: false
        type: string
        default: './internal'
      threshold:
        description: 'Minimum mutation efficacy score (0–100). CI fails if score is below this.'
        required: false
        type: number
        default: 60
      gremlins-version:
        description: 'gremlins version tag to install, e.g. "v0.5.0".'
        required: false
        type: string
        default: 'v0.6.0'
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
    outputs:
      mutation-score:
        description: 'Achieved mutation efficacy score (integer, 0–100)'
        value: ${{ jobs.mutation.outputs.score }}

jobs:
  mutation:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    name: Mutation score (gremlins)
    runs-on: ${{ fromJson(inputs.runner) }}
    outputs:
      score: ${{ steps.run.outputs.score }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      # Build the test binary cache before gremlins starts mutating —
      # avoids redundant compilation on every mutant.
      - name: Pre-build test binary cache
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          set -euo pipefail
          read -r -a packages_arr <<< "${PACKAGES:-}"
          go test -run='^$' "${packages_arr[@]}" 2>/dev/null || true

      - name: Install gremlins
        env:
          GREMLINS_VERSION: ${{ inputs.gremlins-version }}
        run: |
          set -euo pipefail
          go install github.com/go-gremlins/gremlins/cmd/gremlins@"$GREMLINS_VERSION"

      - name: Run mutation testing
        id: run
        env:
          THRESHOLD: ${{ inputs.threshold }}
          PACKAGES: ${{ inputs.packages }}
        run: |
          set -euo pipefail
          read -r -a packages_arr <<< "${PACKAGES:-}"

          # gremlins exits 1 if efficacy < threshold, 0 otherwise
          # Capture output so we can extract the score for the job output
          output=$(gremlins unleash \
            --threshold-efficacy="$THRESHOLD" \
            "${packages_arr[@]}" 2>&1) || exit_code=$?

          echo "$output"

          # Extract score from gremlins summary line: "Efficacy: XX.XX%"
          score=$(echo "$output" | grep -oE 'Efficacy:[[:space:]]+[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "score=${score}" >> "$GITHUB_OUTPUT"

          echo "::notice title=Mutation Score::Efficacy: ${score}% (threshold: ${THRESHOLD}%)"

          exit "${exit_code:-0}"

      - name: Annotate score
        if: always()
        env:
          SCORE: ${{ steps.run.outputs.score }}
          THRESHOLD: ${{ inputs.threshold }}
        run: |
          if [[ "${SCORE:-0}" -lt "$THRESHOLD" ]]; then
            echo "::error title=Mutation Score Too Low::Score ${SCORE}% is below threshold ${THRESHOLD}%. Add tests that kill more mutants."
          else
            echo "::notice title=Mutation Score OK::Score ${SCORE}% ≥ threshold ${THRESHOLD}%."
          fi
