name: Go OSV Scanner

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Go module"
        required: false
        type: string
        default: "."
      upload-sarif:
        description: "Upload SARIF to GitHub code scanning"
        required: false
        type: boolean
        default: true
      fail-on-issues:
        description: "Fail the workflow if vulnerabilities are found (default: false — results are uploaded as SARIF only)"
        required: false
        type: boolean
        default: false
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  osv-scan:
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
      security-events: write
    name: OSV Scanner (Go)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: ${{ !inputs.fail-on-issues }}
        with:
          scan-args: |-
            --format=sarif
            --output=${{ inputs.working-directory }}/osv.sarif
            --lockfile=${{ inputs.working-directory }}/go.mod

      - name: Upload SARIF
        if: inputs.upload-sarif
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: ${{ inputs.working-directory }}/osv.sarif
          category: osv-scanner-go
