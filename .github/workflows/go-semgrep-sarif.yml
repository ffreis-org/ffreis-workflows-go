name: Go SAST (Semgrep + SARIF)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory to scan"
        type: string
        default: "."
      config:
        description: "Semgrep config/ruleset (e.g. auto, p/golang)"
        type: string
        default: "p/golang"
      semgrep-version:
        description: "Semgrep version to install (e.g. 1.99.0)"
        type: string
        default: "1.99.0"
      upload-sarif:
        description: "Upload SARIF to GitHub code scanning"
        type: boolean
        default: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install semgrep
        env:
          SEMGREP_VERSION: ${{ inputs.semgrep-version }}
        run: pip install "semgrep==$SEMGREP_VERSION"

      - name: Run semgrep
        env:
          SEMGREP_CONFIG: ${{ inputs.config }}
        run: |
          set -euo pipefail
          semgrep scan --config "$SEMGREP_CONFIG" --sarif --output semgrep.sarif .
          test -s semgrep.sarif

      - name: Upload SARIF
        if: inputs.upload-sarif && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: ${{ inputs.working-directory }}/semgrep.sarif
          category: semgrep
