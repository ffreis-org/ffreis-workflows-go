name: Go Dependency Scan (Snyk)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Go module"
        required: false
        type: string
        default: "."
      node-version:
        description: "Node.js version for Snyk CLI"
        required: false
        type: number
        default: 22
      snyk-version:
        description: "Snyk CLI version to install (e.g. 1.1291.0)"
        required: false
        type: string
        default: "1.1291.0"
      upload-sarif:
        description: "Upload SARIF to GitHub code scanning"
        required: false
        type: boolean
        default: true
      fail-on-issues:
        description: "Fail the workflow if Snyk finds vulnerabilities (default: false — results are uploaded as SARIF only)"
        required: false
        type: boolean
        default: false
    secrets:
      SNYK_TOKEN:
        description: "Snyk API token (optional; when absent the scan is skipped and an empty SARIF is uploaded)"
        required: false

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  snyk:
    name: Snyk (Go)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Snyk
        env:
          SNYK_VERSION: ${{ inputs.snyk-version }}
        run: npm install -g "snyk@$SNYK_VERSION"

      - name: Snyk OSS Test (Go)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          FAIL_ON_ISSUES: ${{ inputs.fail-on-issues }}
        run: |
          set -euo pipefail
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' > snyk.sarif
            echo "SNYK_TOKEN not set; skipping scan"
            exit 0
          fi
          if [ "$FAIL_ON_ISSUES" = "true" ]; then
            snyk test --file=go.mod --sarif-file-output=snyk.sarif
          else
            snyk test --file=go.mod --sarif-file-output=snyk.sarif || true
          fi
          test -s snyk.sarif

      - name: Upload SARIF
        if: inputs.upload-sarif
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: ${{ inputs.working-directory }}/snyk.sarif
          category: snyk-go
