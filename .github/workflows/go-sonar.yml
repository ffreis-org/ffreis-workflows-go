name: Go SonarCloud

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing the Go module'
        required: false
        type: string
        default: '.'
      sonar-project-key:
        description: 'SonarCloud project key (defaults to repository name)'
        required: false
        type: string
        default: ''
      sonar-organization:
        description: 'SonarCloud organization slug'
        required: false
        type: string
        default: ''
      run-on-pr:
        description: 'If true, run SonarCloud on pull_request events (requires SonarCloud ALM binding)'
        required: false
        type: boolean
        default: true
      coverage-artifact-name:
        description: 'Name of the coverage artifact uploaded by go-test.yml'
        required: false
        type: string
        default: ''
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
    secrets:
      SONAR_TOKEN:
        required: true

permissions: {}

jobs:
  sonar:
    timeout-minutes: 30
    permissions:
      contents: read
    name: SonarCloud
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || inputs.run-on-pr
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate SonarCloud token
        env:
          SONAR_TOKEN_INPUT: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$SONAR_TOKEN_INPUT" ]]; then
            echo "::error::Missing required secret SONAR_TOKEN"
            exit 1
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Download coverage artifact
        if: inputs.coverage-artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.working-directory }}

      - name: Generate coverage (if no artifact)
        if: inputs.coverage-artifact-name == ''
        run: |
          set -euo pipefail
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout=120s

      - name: Build Sonar extra args
        id: sonar-args
        env:
          PROJECT_KEY_INPUT: ${{ inputs.sonar-project-key }}
          PROJECT_KEY_VAR: ${{ vars.SONAR_PROJECT_KEY }}
          ORGANIZATION_INPUT: ${{ inputs.sonar-organization }}
          ORGANIZATION_VAR: ${{ vars.SONAR_ORGANIZATION }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          PROJECT_KEY="${PROJECT_KEY_INPUT:-}"
          if [[ -z "$PROJECT_KEY" ]]; then
            PROJECT_KEY="${PROJECT_KEY_VAR:-}"
          fi
          if [[ -z "$PROJECT_KEY" && -f sonar-project.properties ]]; then
            PROJECT_KEY="$(grep -E '^sonar[.]projectKey=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          if [[ -z "$PROJECT_KEY" ]]; then
            OWNER_LOWER="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
            PROJECT_KEY="${OWNER_LOWER}_${REPO}"
          fi

          ORGANIZATION="${ORGANIZATION_INPUT:-}"
          if [[ -z "$ORGANIZATION" ]]; then
            ORGANIZATION="${ORGANIZATION_VAR:-}"
          fi
          if [[ -z "$ORGANIZATION" && -f sonar-project.properties ]]; then
            ORGANIZATION="$(grep -E '^sonar[.]organization=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          if [[ -z "$ORGANIZATION" ]]; then
            ORGANIZATION="$OWNER"
          fi

          # SonarCloud organization keys are typically lowercase slugs. To avoid
          # failures when repo/org casing differs (e.g. GitHub owner "FelipeFuhr"
          # vs Sonar org "felipefuhr"), normalize to lowercase.
          ORGANIZATION="$(printf '%s' "$ORGANIZATION" | tr '[:upper:]' '[:lower:]')"

          EXTRA=""
          [ -n "$PROJECT_KEY" ] && EXTRA="$EXTRA -Dsonar.projectKey=$PROJECT_KEY"
          [ -n "$ORGANIZATION" ] && EXTRA="$EXTRA -Dsonar.organization=$ORGANIZATION"
          echo "args=$EXTRA" >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            ${{ steps.sonar-args.outputs.args }}
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,**/*_test.go
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
