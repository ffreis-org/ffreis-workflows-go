name: Go Test

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing the Go module'
        required: false
        type: string
        default: '.'
      test-tags:
        description: 'Build tags passed to go test via -tags'
        required: false
        type: string
        default: ''
      test-timeout:
        description: 'Timeout passed to go test -timeout'
        required: false
        type: string
        default: '120s'
      extra-test-args:
        description: 'Newline-separated extra args appended to go test (one arg per line)'
        required: false
        type: string
        default: ''
      run-govulncheck:
        description: 'Run govulncheck after tests'
        required: false
        type: boolean
        default: true
      coverage-artifact-name:
        description: 'Name for the uploaded coverage artifact'
        required: false
        type: string
        default: 'coverage'
    outputs:
      coverage-artifact:
        description: 'Name of the uploaded coverage artifact'
        value: ${{ jobs.test.outputs.artifact-name }}

jobs:
  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ inputs.coverage-artifact-name }}-${{ github.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum
      - name: Run tests
        env:
          TEST_TAGS: ${{ inputs.test-tags }}
          TEST_TIMEOUT: ${{ inputs.test-timeout }}
          EXTRA_TEST_ARGS: ${{ inputs.extra-test-args }}
        run: |
          set -euo pipefail

          extra_args=()
          if [ -n "$EXTRA_TEST_ARGS" ]; then
            while IFS= read -r arg; do
              [ -z "$arg" ] && continue
              extra_args+=("$arg")
            done <<< "$EXTRA_TEST_ARGS"
          fi

          tag_args=()
          if [ -n "$TEST_TAGS" ]; then
            tag_args+=("-tags" "$TEST_TAGS")
          fi

          go test ./... \
            -v \
            -race \
            -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout="$TEST_TIMEOUT" \
            "${tag_args[@]+"${tag_args[@]}"}" \
            "${extra_args[@]+"${extra_args[@]}"}"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.coverage-artifact-name }}-${{ github.sha }}
          path: ${{ inputs.working-directory }}/coverage.out
          retention-days: 7
      - name: govulncheck
        if: ${{ inputs.run-govulncheck }}
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: ${{ inputs.go-version }}
          check-latest: true
          work-dir: ${{ inputs.working-directory }}
