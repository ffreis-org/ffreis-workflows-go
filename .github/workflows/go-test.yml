name: Go Test

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing the Go module'
        required: false
        type: string
        default: '.'
      test-tags:
        description: 'Build tags passed to go test via -tags'
        required: false
        type: string
        default: ''
      test-timeout:
        description: 'Timeout passed to go test -timeout'
        required: false
        type: string
        default: '120s'
      extra-test-args:
        description: 'Newline-separated extra args appended to go test (one arg per line)'
        required: false
        type: string
        default: ''
      run-govulncheck:
        description: 'Run govulncheck after tests'
        required: false
        type: boolean
        default: true
      fresh:
        description: >
          Force a fresh test run by adding -count=1 (disables Go's test-result
          cache). Default false: the cache is ON, so unchanged packages are
          skipped (Go re-emits their cached coverage). Set true for a scheduled
          flake-detection run that re-executes every package.
        required: false
        type: boolean
        default: false
      coverage-artifact-name:
        description: 'Name for the uploaded coverage artifact'
        required: false
        type: string
        default: 'coverage'
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      go-cache-s3:
        description: >
          Enable the S3 second-tier (L2) build cache. GitHub Actions cache is L1
          (free); on an L1 MISS this restores GOMODCACHE+GOCACHE from S3 and saves
          them back after a green run, so cold/fresh-branch runs warm-start instead
          of a full module download + recompile. No-op (skipped) on an L1 hit.
          Requires go-cache-role-arn.
        required: false
        type: boolean
        default: false
      go-cache-bucket:
        description: "S3 bucket for the L2 Go build cache"
        required: false
        type: string
        default: ""
      go-cache-region:
        description: "AWS region of the L2 cache bucket"
        required: false
        type: string
        default: "us-east-1"
      go-cache-role-arn:
        description: "IAM role ARN assumed via OIDC for L2 cache S3 access"
        required: false
        type: string
        default: ""
    outputs:
      coverage-artifact:
        description: 'Name of the uploaded coverage artifact'
        value: ${{ jobs.test.outputs.artifact-name }}

permissions: {}

jobs:
  test:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # L2 S3 cache OIDC (no-op when go-cache-s3 is false)
    name: Test (race + coverage)
    runs-on: "${{ vars.CI_RUNNER && fromJson(vars.CI_RUNNER) || 'ubuntu-latest' }}"
    outputs:
      artifact-name: ${{ inputs.coverage-artifact-name }}-${{ github.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        id: setupgo
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      # --- L2 (S3) build cache: only engaged on an L1 (GitHub cache) MISS ---
      - name: AWS credentials (L2 cache)
        if: ${{ inputs.go-cache-s3 && inputs.go-cache-role-arn != '' && steps.setupgo.outputs.cache-hit != 'true' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ inputs.go-cache-role-arn }}
          aws-region: ${{ inputs.go-cache-region }}

      - name: Restore Go build cache from S3 (L2, on L1 miss)
        if: ${{ inputs.go-cache-s3 && inputs.go-cache-role-arn != '' && steps.setupgo.outputs.cache-hit != 'true' }}
        env:
          BUCKET: ${{ inputs.go-cache-bucket }}
        run: |
          set -euo pipefail
          [ -f go.sum ] || { echo "::notice::no go.sum — skipping L2 restore"; exit 0; }
          key="gocache/${GITHUB_REPOSITORY}/$(sha256sum go.sum | cut -c1-32).tar.zst"
          if aws s3 cp "s3://${BUCKET}/${key}" /tmp/go-l2.tar.zst --no-progress 2>/dev/null; then
            tar --zstd -xf /tmp/go-l2.tar.zst -C / && echo "::notice::L2 cache hit (${key})"
          else
            echo "::notice::L2 cache miss — cold build (${key})"
          fi

      - name: Run tests
        env:
          TEST_TAGS: ${{ inputs.test-tags }}
          TEST_TIMEOUT: ${{ inputs.test-timeout }}
          EXTRA_TEST_ARGS: ${{ inputs.extra-test-args }}
          FRESH: ${{ inputs.fresh }}
        run: |
          set -euo pipefail

          extra_args=()
          if [ -n "$EXTRA_TEST_ARGS" ]; then
            while IFS= read -r arg; do
              [ -z "$arg" ] && continue
              extra_args+=("$arg")
            done <<< "$EXTRA_TEST_ARGS"
          fi

          tag_args=()
          if [ -n "$TEST_TAGS" ]; then
            tag_args+=("-tags" "$TEST_TAGS")
          fi

          # fresh=true → -count=1 forces re-execution (scheduled flake hunt).
          # fresh=false (default) → omit it so Go's test-result cache skips
          # unchanged packages; cached coverage is still re-emitted (verified).
          count_args=()
          if [ "$FRESH" = "true" ]; then
            count_args+=("-count=1")
          fi

          go test ./... \
            -v \
            -race \
            "${count_args[@]+"${count_args[@]}"}" \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout="$TEST_TIMEOUT" \
            "${tag_args[@]+"${tag_args[@]}"}" \
            "${extra_args[@]+"${extra_args[@]}"}"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.coverage-artifact-name }}-${{ github.sha }}
          path: ${{ inputs.working-directory }}/coverage.out
          retention-days: 7
      - name: govulncheck
        if: ${{ inputs.run-govulncheck }}
        uses: golang/govulncheck-action@31f7c5463448f83528bd771c2d978d940080c9fd # v1
        with:
          go-version-input: ${{ inputs.go-version }}
          check-latest: true
          work-dir: ${{ inputs.working-directory }}

      # Save the warmed GOMODCACHE+GOCACHE to S3 only when L1 missed and the run
      # is green. S3 PUT (upload) is free; the egress cost is paid only on a
      # future L1-miss restore, which is rare (GH cache covers the common case).
      - name: Save Go build cache to S3 (L2)
        if: ${{ inputs.go-cache-s3 && inputs.go-cache-role-arn != '' && steps.setupgo.outputs.cache-hit != 'true' && success() }}
        env:
          BUCKET: ${{ inputs.go-cache-bucket }}
        run: |
          set -euo pipefail
          [ -f go.sum ] || { echo "::notice::no go.sum — skipping L2 save"; exit 0; }
          key="gocache/${GITHUB_REPOSITORY}/$(sha256sum go.sum | cut -c1-32).tar.zst"
          gomod="$(go env GOMODCACHE)"
          gobuild="$(go env GOCACHE)"
          tar --zstd -cf /tmp/go-l2.tar.zst -C / "${gomod#/}" "${gobuild#/}"
          aws s3 cp /tmp/go-l2.tar.zst "s3://${BUCKET}/${key}" --no-progress
          echo "::notice::L2 cache saved (${key}, $(du -h /tmp/go-l2.tar.zst | cut -f1))"
