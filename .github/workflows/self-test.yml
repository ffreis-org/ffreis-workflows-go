name: Self Test

on:
  push:
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# go-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# go-deepsource-coverage requires DEEPSOURCE_DSN to be configured in the repository.
# The job is skipped on fork pull requests.
#
# go-snyk requires SNYK_TOKEN plus ENABLE_SNYK=true in repository or organization
# variables. Without that variable the job is explicitly skipped. Fork pull
# requests are also skipped.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows-policy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4

  codeql-actions:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    permissions:
      contents: read
    uses: ./.github/workflows/go-fmt.yml
    with:
      working-directory: examples/hello

  lint:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/go-lint.yml
    with:
      working-directory: examples/hello

  build:
    permissions:
      contents: read
    uses: ./.github/workflows/go-build.yml
    with:
      working-directory: examples/hello

  test:
    permissions:
      contents: read
    uses: ./.github/workflows/go-test.yml
    with:
      working-directory: examples/hello

  fuzz:
    permissions:
      contents: read
    uses: ./.github/workflows/go-fuzz.yml
    with:
      working-directory: examples/hello
      fuzz-targets: FuzzParseExpr
      fuzz-time: 10s
      fuzz-parallelism: 1

  mutation:
    permissions:
      contents: read
    uses: ./.github/workflows/go-mutation.yml
    with:
      working-directory: examples/hello
      packages: ./calculator
      threshold: 50

  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    uses: ./.github/workflows/go-sonar.yml
    with:
      working-directory: examples/hello
      run-on-pr: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    permissions:
      contents: read
    uses: ./.github/workflows/go-security.yml
    with:
      working-directory: examples/hello

  coverage:
    permissions:
      contents: read
    uses: ./.github/workflows/go-coverage.yml
    with:
      working-directory: examples/hello
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    permissions:
      contents: read
    uses: ./.github/workflows/go-docs.yml
    with:
      working-directory: examples/hello

  semgrep:
    permissions:
      contents: read
    uses: ./.github/workflows/go-semgrep.yml
    with:
      working-directory: examples/hello

  semgrep-sarif:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/go-semgrep-sarif.yml
    with:
      working-directory: examples/hello
      upload-sarif: true

  container:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/go-container.yml
    with:
      image: hello-example
      push: false
      containerfile: examples/hello/Containerfile
      working-directory: examples/hello

  mod-tidy:
    permissions:
      contents: read
    uses: ./.github/workflows/go-mod-tidy-check.yml
    with:
      working-directory: examples/hello

  snyk:
    if: vars.ENABLE_SNYK == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/go-snyk.yml
    with:
      working-directory: examples/hello
      upload-sarif: false
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deepsource-coverage:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    uses: ./.github/workflows/go-deepsource-coverage.yml
    with:
      working-directory: examples/hello
    secrets:
      DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

  cross-build-matrix:
    permissions:
      contents: read
    uses: ./.github/workflows/go-cross-build-matrix.yml
    with:
      go-version: "1.25.8"
      working-directory: examples/hello
      targets: |-
        ./...
