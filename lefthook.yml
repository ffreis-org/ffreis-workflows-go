# lefthook.yml — Go quality hooks
# pre-commit: fast (<20 s) — fmt check + hygiene + secrets
# pre-push:   deeper (<90 s) — actionlint + golangci-lint on examples

pre-commit:
  parallel: true
  commands:
    hygiene-merge-markers:
      run: ./scripts/hooks/check_merge_markers.sh
    hygiene-large-files:
      run: ./scripts/hooks/check_large_files.sh
    hygiene-binary-files:
      run: ./scripts/hooks/check_binary_files.sh
    fmt-check:
      glob: "examples/**/*.go"
      run: make fmt-check
    secret-scan:
      run: make secrets-scan-staged
    actionlint:
      run: command -v actionlint >/dev/null 2>&1 && actionlint || echo "INFO: actionlint not found — skipping. Install from https://github.com/rhysd/actionlint#installation"

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint

commit-msg:
  commands:
    conventional-commits:
      run: ./scripts/hooks/check_commit_msg.sh {1}
